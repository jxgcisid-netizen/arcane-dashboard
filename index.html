<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBX Bot - 控制面板</title>
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #11161e;
            --border: #1c2333;
            --cyan: #00b4d8;
            --pink: #e91e63;
            --gold: #f0a500;
            --text: #e2e8f0;
            --text-secondary: #8895a8;
            --text-muted: #546078;
            --success: #2ecc71;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand { font-size: 20px; font-weight: 700; }
        .navbar-brand span { color: var(--cyan); }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--text-muted); display: inline-block; margin-right: 8px;
        }
        .status-dot.online { background: var(--success); }

        .container { max-width: 1280px; margin: 0 auto; padding: 32px; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px;
        }

        .stat-label {
            font-size: 12px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
        }

        .stat-value { font-size: 40px; font-weight: 700; }
        .stat-card:nth-child(1) .stat-value { color: var(--cyan); }
        .stat-card:nth-child(2) .stat-value { color: var(--pink); }
        .stat-card:nth-child(3) .stat-value { color: var(--gold); }

        .content-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
        }

        .panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
        }

        .panel-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border);
            font-size: 16px; font-weight: 600;
        }

        .panel-body { padding: 16px 24px 24px; max-height: 480px; overflow-y: auto; }

        table { width: 100%; border-collapse: collapse; }

        th {
            font-size: 11px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.8px;
            padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border);
        }

        td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .guild-id { font-family: monospace; font-size: 12px; color: var(--text-secondary); }
        .level-tag {
            display: inline-block; background: rgba(0,180,216,0.15);
            color: var(--cyan); padding: 2px 10px; border-radius: 20px;
            font-weight: 600; font-size: 12px;
        }

        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; }
        .toolbar input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 8px 14px; border-radius: 8px;
            font-size: 13px; font-family: monospace; outline: none;
        }

        .btn {
            padding: 8px 16px; border-radius: 8px; font-size: 13px;
            font-weight: 600; cursor: pointer; border: none;
            background: var(--cyan); color: #000;
        }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }

        @media (max-width: 900px) {
            .content-grid { grid-template-columns: 1fr; }
            .stats-grid { gap: 12px; }
            .stat-value { font-size: 28px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Arcane<span>Bot</span></div>
        <div id="status"><div class="status-dot" id="dot"></div>连接中...</div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总用户</div>
                <div class="stat-value" id="total-users">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">服务器</div>
                <div class="stat-value" id="total-guilds">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最高等级</div>
                <div class="stat-value" id="max-level">--</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="panel">
                <div class="panel-header">服务器列表</div>
                <div class="panel-body">
                    <table><thead><tr><th>服务器 ID</th><th>用户数</th><th>最高等级</th></tr></thead><tbody id="guilds-tbody"><tr><td colspan="3" class="empty-state">加载中...</td></tr></tbody></table>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">排行榜</div>
                <div class="panel-body">
                    <div class="toolbar">
                        <input type="text" id="guild-id-input" placeholder="输入服务器 ID 或点击左侧服务器">
                        <button class="btn" onclick="loadLeaderboard()">查询</button>
                    </div>
                    <table id="lb-table" style="display:none;"><thead><tr><th>#</th><th>用户</th><th>等级</th><th>XP</th></tr></thead><tbody></tbody></table>
                    <div class="empty-state" id="lb-empty">点击左侧服务器或输入 ID 查看排行</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://web--arcane--d9n9n2zg4zh5.code.run";

        fetch(API + "/api/health")
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    document.getElementById("dot").className = "status-dot online";
                    document.getElementById("status").innerHTML = '<div class="status-dot online"></div>已连接';
                    loadAll();
                }
            });

        function loadAll() {
            fetch(API + "/api/stats").then(r => r.json()).then(d => {
                if (d.success) {
                    document.getElementById("total-users").textContent = d.data.total_users.toLocaleString();
                    document.getElementById("total-guilds").textContent = d.data.total_guilds;
                    document.getElementById("max-level").textContent = d.data.max_level;
                }
            });

            fetch(API + "/api/guilds").then(r => r.json()).then(d => {
                const tb = document.getElementById("guilds-tbody");
                if (d.success && d.data.length) {
                    tb.innerHTML = d.data.map(g => `<tr style="cursor:pointer" onclick="viewGuild('${g.guild_id}')">
                        <td><span class="guild-id">${g.guild_id}</span></td>
                        <td>${g.user_count}</td>
                        <td><span class="level-tag">Lv ${g.max_level}</span></td>
                    </tr>`).join("");
                } else {
                    tb.innerHTML = '<tr><td colspan="3" class="empty-state">暂无数据</td></tr>';
                }
            });
        }

        function viewGuild(id) {
            document.getElementById("guild-id-input").value = id;
            loadLeaderboard();
        }

        function loadLeaderboard() {
            const id = document.getElementById("guild-id-input").value.trim();
            if (!id) return;
            fetch(API + "/api/leaderboard/" + id).then(r => r.json()).then(d => {
                const table = document.getElementById("lb-table");
                const empty = document.getElementById("lb-empty");
                if (d.success && d.data.length) {
                    table.style.display = "table"; empty.style.display = "none";
                    table.querySelector("tbody").innerHTML = d.data.map(row => `
                        <tr>
                            <td>${row.rank <= 3 ? ['1st','2nd','3rd'][row.rank-1] : row.rank}</td>
                            <td><span class="guild-id">${row.user_id}</span></td>
                            <td><span class="level-tag">Lv ${row.level}</span></td>
                            <td>${row.xp.toLocaleString()}</td>
                        </tr>`).join("");
                } else {
                    table.style.display = "none"; empty.style.display = "block";
                }
            });
        }
    </script>
</body>
</html>
