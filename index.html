<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBX Bot - 控制面板</title>
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #11161e;
            --surface-hover: #171d28;
            --border: #1c2333;
            --border-light: #252d3d;
            --cyan: #00b4d8;
            --cyan-glow: rgba(0,180,216,0.15);
            --pink: #e91e63;
            --gold: #f0a500;
            --text: #e2e8f0;
            --text-secondary: #8895a8;
            --text-muted: #546078;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -20%, rgba(0,180,216,0.06), transparent),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(233,30,99,0.04), transparent);
        }

        .lockscreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s, visibility 0.4s;
        }
        .lockscreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .lock-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            width: 400px;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 0 60px rgba(0,180,216,0.08);
        }
        .lock-icon { font-size: 48px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .lock-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .lock-title span { color: var(--cyan); }
        .lock-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
        .lock-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 15px;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: border-color var(--transition);
        }
        .lock-input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,180,216,0.08);
        }
        .lock-input::placeholder { color: var(--text-muted); letter-spacing: 1px; }
        .lock-btn {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--cyan);
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition), transform 0.1s;
            letter-spacing: 0.5px;
        }
        .lock-btn:hover { background: #00c8ee; }
        .lock-btn:active { transform: scale(0.97); }
        .lock-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .lock-error { color: var(--danger); font-size: 12px; margin-top: 12px; min-height: 18px; }
        .lock-remember {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-brand { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
        .navbar-brand span {
            background: linear-gradient(135deg, var(--cyan), #0098b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-actions { display: flex; align-items: center; gap: 16px; }
        .navbar-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .status-dot.online { background: var(--success); animation: pulse 2s infinite; }
        .status-dot.error { background: var(--danger); }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(46,204,113,0); }
        }
        .btn-icon {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            font-size: 12px;
            transition: all var(--transition);
        }
        .btn-icon:hover { background: var(--surface-hover); border-color: var(--border-light); color: var(--text); }
        .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(231,76,60,0.08); }

        .container { max-width: 1280px; margin: 0 auto; padding: 32px 32px 64px; }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
            color: var(--text-muted);
            background: transparent;
            border: none;
        }
        .tab:hover { color: var(--text-secondary); }
        .tab.active { background: var(--cyan-glow); color: var(--cyan); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 36px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            transition: border-color var(--transition), transform var(--transition);
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
        }
        .stat-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: var(--shadow); }
        .stat-card:nth-child(1)::after { background: var(--cyan); }
        .stat-card:nth-child(2)::after { background: var(--pink); }
        .stat-card:nth-child(3)::after { background: var(--gold); }
        .stat-card:nth-child(4)::after { background: var(--success); }
        .stat-label {
            font-size: 11px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px;
        }
        .stat-value { font-size: 38px; font-weight: 700; letter-spacing: -1px; }
        .stat-card:nth-child(1) .stat-value { color: var(--cyan); }
        .stat-card:nth-child(2) .stat-value { color: var(--pink); }
        .stat-card:nth-child(3) .stat-value { color: var(--gold); }
        .stat-card:nth-child(4) .stat-value { color: var(--success); }

        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .content-grid.single { grid-template-columns: 1fr; }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .panel.full-width { grid-column: 1 / -1; }
        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .panel-header .badge {
            font-size: 11px;
            background: var(--cyan-glow);
            color: var(--cyan);
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .panel-body { padding: 16px 24px 24px; max-height: 520px; overflow-y: auto; }
        .panel-body::-webkit-scrollbar { width: 4px; }
        .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; }
        th {
            font-size: 11px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.8px;
            padding: 10px 12px; text-align: left;
            border-bottom: 2px solid var(--border);
            position: sticky; top: 0; background: var(--surface); z-index: 1;
        }
        td { padding: 12px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tbody tr { cursor: pointer; transition: background 0.15s; }
        tbody tr:hover td { background: rgba(255,255,255,0.03); }
        tbody tr.active td { background: rgba(0,180,216,0.06); }
        .guild-id { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px; color: var(--text-secondary); }
        .guild-name { font-weight: 500; }
        .level-tag {
            display: inline-block;
            background: rgba(0,180,216,0.12);
            color: var(--cyan);
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
        }
        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
        }
        .rank-1 { background: rgba(240,165,0,0.2); color: var(--gold); }
        .rank-2 { background: rgba(192,192,192,0.15); color: #c0c0c0; }
        .rank-3 { background: rgba(205,127,50,0.15); color: #cd7f32; }
        .rank-other { color: var(--text-muted); }

        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .toolbar input, .toolbar select {
            flex: 1; min-width: 150px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color var(--transition);
        }
        .toolbar input:focus, .toolbar select:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,180,216,0.08); }
        .toolbar input::placeholder { color: var(--text-muted); }
        .toolbar select option { background: var(--surface); color: var(--text); }

        .btn {
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: var(--cyan);
            color: #000;
            letter-spacing: 0.3px;
            transition: background var(--transition), transform 0.1s;
            white-space: nowrap;
        }
        .btn:hover { background: #00c8ee; }
        .btn:active { transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-outline:hover { background: var(--surface-hover); border-color: var(--border-light); color: var(--text); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #3ddb84; }

        textarea {
            width: 100%;
            min-height: 80px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            outline: none;
        }
        textarea:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,180,216,0.08); }
        .char-count { text-align: right; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .char-count.warn { color: var(--warning); }
        .char-count.danger { color: var(--danger); }

        .toggle-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
        .toggle { position: relative; width: 40px; height: 22px; }
        .toggle input { display: none; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--border);
            border-radius: 22px;
            transition: var(--transition);
        }
        .toggle-slider:before {
            content: '';
            position: absolute;
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background: var(--text-muted);
            border-radius: 50%;
            transition: var(--transition);
        }
        .toggle input:checked + .toggle-slider { background: var(--cyan); }
        .toggle input:checked + .toggle-slider:before { transform: translateX(18px); background: #fff; }

        .embed-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .embed-options input {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 8px 12px; border-radius: var(--radius-xs); font-size: 12px; outline: none; width: 100%;
        }
        .embed-options label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }

        .message-preview {
            margin-top: 16px; padding: 16px; background: var(--bg);
            border: 1px solid var(--border); border-radius: var(--radius-sm); display: none;
        }
        .message-preview.show { display: block; }
        .preview-embed {
            background: #1a1c20; border-left: 4px solid var(--cyan); border-radius: 6px;
            padding: 12px 16px; margin-top: 12px;
        }
        .preview-embed-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .preview-embed-desc { font-size: 13px; color: var(--text-secondary); }
        .preview-embed-footer { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

        .settings-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0; border-bottom: 1px solid var(--border); gap: 16px;
        }
        .settings-row:last-child { border-bottom: none; }
        .settings-label { font-size: 13px; font-weight: 500; }
        .settings-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .settings-input {
            width: 90px; background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 8px 10px; border-radius: var(--radius-xs); font-size: 13px; text-align: center;
            outline: none; font-family: 'SF Mono', 'Fira Code', monospace; flex-shrink: 0;
        }
        .settings-input:focus { border-color: var(--cyan); }

        .guild-preview {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;
        }
        .guild-preview-item {
            background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 12px 16px; text-align: center;
        }
        .guild-preview-item .value { font-size: 22px; font-weight: 700; color: var(--cyan); }
        .guild-preview-item .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; letter-spacing: 0.8px; }

        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 14px; }
        .empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }

        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
            animation: slideUp 0.3s ease; box-shadow: var(--shadow); max-width: 380px;
        }
        .toast.success { background: #1a3a2a; color: var(--success); border: 1px solid rgba(46,204,113,0.3); }
        .toast.error { background: #3a1a1a; color: var(--danger); border: 1px solid rgba(231,76,60,0.3); }
        .toast.info { background: #1a2a3a; color: var(--cyan); border: 1px solid rgba(0,180,216,0.3); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .content-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .stat-value { font-size: 28px; }
            .container { padding: 16px; }
            .navbar { padding: 0 16px; }
            .tabs { flex-wrap: wrap; }
            .tab { flex: 1 1 auto; font-size: 12px; padding: 8px 12px; }
            .guild-preview { grid-template-columns: 1fr 1fr; }
            .embed-options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- ==================== 密码锁屏 ==================== -->
    <div class="lockscreen" id="lockscreen">
        <div class="lock-box">
            <div class="lock-icon">🔐</div>
            <div class="lock-title">FBX<span>Bot</span> 控制面板</div>
            <div class="lock-subtitle">请输入访问密码</div>
            <input type="password" class="lock-input" id="password-input" placeholder="••••••" autocomplete="current-password" maxlength="64" onkeydown="if(event.key==='Enter')unlock()">
            <button class="lock-btn" id="lock-btn" onclick="unlock()">🔓 解锁</button>
            <label class="lock-remember">
                <input type="checkbox" id="remember-checkbox" checked>
                记住我（下次自动登录）
            </label>
            <div class="lock-error" id="lock-error"></div>
        </div>
    </div>

    <!-- ==================== 导航栏 ==================== -->
    <nav class="navbar">
        <div class="navbar-brand">FBX<span>Bot</span></div>
        <div class="navbar-actions">
            <div class="navbar-status">
                <div class="status-dot" id="dot"></div>
                <span id="status-text">连接中...</span>
            </div>
            <button class="btn-icon danger" onclick="lockScreen()" title="锁定面板">🔒 锁定</button>
        </div>
    </nav>

    <div class="container" id="main-content">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('dashboard')">📊 仪表盘</button>
            <button class="tab" onclick="switchTab('messenger')">💬 消息发送</button>
            <button class="tab" onclick="switchTab('settings')">⚙️ 设置</button>
        </div>

        <!-- 仪表盘 -->
        <div class="tab-content active" id="tab-dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">📊 总用户</div>
                    <div class="stat-value" id="total-users">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">🌐 服务器</div>
                    <div class="stat-value" id="total-guilds">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">🏆 最高等级</div>
                    <div class="stat-value" id="max-level">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">💚 Bot 状态</div>
                    <div class="stat-value" style="font-size:18px;" id="bot-status">在线</div>
                </div>
            </div>
            <div class="content-grid">
                <div class="panel">
                    <div class="panel-header">服务器列表<span class="badge" id="guild-count">0</span></div>
                    <div class="panel-body" id="guilds-panel"><div class="spinner"></div></div>
                </div>
                <div class="panel">
                    <div class="panel-header">排行榜<span class="badge" id="lb-count" style="display:none;">0</span></div>
                    <div class="panel-body">
                        <div class="toolbar">
                            <input type="text" id="guild-id-input" placeholder="输入服务器 ID（点击左侧自动填入）">
                            <button class="btn" onclick="loadLeaderboard()">🔍 查询</button>
                        </div>
                        <div id="lb-content">
                            <div class="empty-state"><div class="icon">📋</div>点击左侧服务器或输入 ID 查看排行榜</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 消息发送 -->
        <div class="tab-content" id="tab-messenger">
            <div class="content-grid single">
                <div class="panel full-width">
                    <div class="panel-header">💬 通过 Bot 发送消息<span class="badge" id="msg-guild-hint">请先选择服务器</span></div>
                    <div class="panel-body">
                        <div class="toolbar">
                            <select id="msg-guild-select" onchange="onMsgGuildChange()"><option value="">-- 选择服务器 --</option></select>
                            <select id="msg-channel-select" onchange="onChannelChange()"><option value="">-- 先选服务器，再选频道 --</option></select>
                        </div>
                        <div class="guild-preview" id="guild-preview" style="display:none;"></div>
                        <div style="margin-top:12px;">
                            <textarea id="message-content" placeholder="输入要发送的消息内容..." maxlength="2000" oninput="updateCharCount()"></textarea>
                            <div class="char-count" id="char-count">0 / 2000</div>
                        </div>
                        <div class="toggle-row">
                            <label class="toggle">
                                <input type="checkbox" id="embed-enabled" onchange="toggleEmbed()">
                                <span class="toggle-slider"></span>
                            </label>
                            <span style="font-size:12px;color:var(--text-secondary);">附加 Embed 消息</span>
                        </div>
                        <div class="embed-options" id="embed-options" style="display:none;">
                            <div><label>标题</label><input type="text" id="embed-title" placeholder="Embed 标题" maxlength="256"></div>
                            <div><label>颜色</label><input type="text" id="embed-color" placeholder="#00b4d8" value="#00b4d8" maxlength="7"></div>
                            <div style="grid-column:1/-1;"><label>描述</label><input type="text" id="embed-description" placeholder="Embed 描述内容" maxlength="4096"></div>
                            <div><label>页脚</label><input type="text" id="embed-footer" placeholder="页脚文字" maxlength="2048"></div>
                            <div><label>缩略图 URL</label><input type="text" id="embed-thumbnail" placeholder="https://..."></div>
                        </div>
                        <div style="display:flex;gap:10px;margin-top:16px;">
                            <button class="btn btn-success" onclick="sendMessage()" id="send-btn">📨 发送消息</button>
                            <button class="btn btn-outline" onclick="previewMessage()">👁 预览</button>
                        </div>
                        <div class="message-preview" id="message-preview">
                            <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">预览效果</div>
                            <div id="preview-content" style="color:var(--text);font-size:13px;white-space:pre-wrap;"></div>
                            <div class="preview-embed" id="preview-embed" style="display:none;">
                                <div class="preview-embed-title" id="preview-embed-title"></div>
                                <div class="preview-embed-desc" id="preview-embed-desc"></div>
                                <div class="preview-embed-footer" id="preview-embed-footer"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 设置 -->
        <div class="tab-content" id="tab-settings">
            <div class="content-grid single">
                <div class="panel full-width">
                    <div class="panel-header">⚙️ 服务器设置<span class="badge" id="settings-guild-hint">请先选择服务器</span></div>
                    <div class="panel-body" id="settings-panel">
                        <div class="empty-state"><div class="icon">🔒</div>在仪表盘中选择一个服务器来编辑设置</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        // ==================== 配置 ====================
        const API = "https://web--arcane--d9n9n2zg4zh5.code.run";
        const STORAGE_KEY = "fbxbot_auth_token";
        const REMEMBER_KEY = "fbxbot_remember";

        let currentGuildId = null;
        let guildsData = [];
        let availableChannels = [];

        // ==================== API 请求封装（自动带 token） ====================
        function getToken() {
            return localStorage.getItem(STORAGE_KEY);
        }

        async function apiFetch(url, options = {}) {
            const token = getToken();
            const headers = { ...(options.headers || {}) };
            if (token) {
                headers["Authorization"] = "Bearer " + token;
            }
            if (options.body && typeof options.body === "string" && !headers["Content-Type"]) {
                headers["Content-Type"] = "application/json";
            }
            return fetch(url, { ...options, headers });
        }

        // ==================== 密码验证 ====================
        async function initAuth() {
            const remember = localStorage.getItem(REMEMBER_KEY);
            const storedToken = localStorage.getItem(STORAGE_KEY);

            if (remember === "true" && storedToken) {
                const valid = await verifyToken(storedToken);
                if (valid) {
                    document.getElementById("lockscreen").classList.add("hidden");
                    initApp();
                    return;
                } else {
                    localStorage.removeItem(STORAGE_KEY);
                }
            }

            document.getElementById("lockscreen").classList.remove("hidden");
            document.getElementById("password-input").focus();
        }

        async function verifyToken(token) {
            try {
                const resp = await apiFetch(API + "/api/verify-token", {
                    headers: { "Authorization": "Bearer " + token }
                });
                const data = await resp.json();
                return data.success === true;
            } catch (e) {
                return false;
            }
        }

        async function unlock() {
            const password = document.getElementById("password-input").value.trim();
            const errorEl = document.getElementById("lock-error");
            const btn = document.getElementById("lock-btn");
            const remember = document.getElementById("remember-checkbox").checked;

            if (!password) {
                errorEl.textContent = "请输入密码";
                return;
            }

            btn.disabled = true;
            btn.textContent = "验证中...";
            errorEl.textContent = "";

            try {
                const resp = await fetch(API + "/api/auth", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: password })
                });
                const data = await resp.json();

                if (data.success) {
                    document.getElementById("lockscreen").classList.add("hidden");
                    localStorage.setItem(STORAGE_KEY, data.token);
                    localStorage.setItem(REMEMBER_KEY, remember ? "true" : "false");
                    initApp();
                } else {
                    errorEl.textContent = data.error || "密码错误";
                    document.getElementById("password-input").value = "";
                    document.getElementById("password-input").focus();
                }
            } catch (e) {
                errorEl.textContent = "连接失败，请检查网络";
            } finally {
                btn.disabled = false;
                btn.textContent = "🔓 解锁";
            }
        }

        function lockScreen() {
            if (localStorage.getItem(REMEMBER_KEY) !== "true") {
                localStorage.removeItem(STORAGE_KEY);
            }
            document.getElementById("lockscreen").classList.remove("hidden");
            document.getElementById("password-input").value = "";
            document.getElementById("lock-error").textContent = "";
            document.getElementById("password-input").focus();
        }

        // ==================== 初始化 ====================
        async function initApp() {
            try {
                const resp = await apiFetch(API + "/api/health");
                const data = await resp.json();
                if (data.success) {
                    setStatus("online", "已连接");
                    loadAll();
                } else {
                    setStatus("error", "API 异常");
                }
            } catch (e) {
                console.error("连接失败:", e);
                setStatus("error", "无法连接");
                setTimeout(initApp, 5000);
            }
        }

        function setStatus(state, text) {
            const dot = document.getElementById("dot");
            dot.className = "status-dot " + state;
            document.getElementById("status-text").textContent = text;
            if (state === "online") {
                document.getElementById("bot-status").textContent = "在线";
                document.getElementById("bot-status").style.color = "var(--success)";
            } else {
                document.getElementById("bot-status").textContent = "离线";
                document.getElementById("bot-status").style.color = "var(--danger)";
            }
        }

        // ==================== Tab 切换 ====================
        function switchTab(tabName) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add("active");
            document.getElementById("tab-" + tabName).classList.add("active");
            if (tabName === "messenger") populateMsgGuildSelect();
            if (tabName === "settings" && currentGuildId) loadSettings();
        }

        // ==================== 加载数据 ====================
        async function loadAll() {
            await Promise.all([loadStats(), loadGuilds()]);
        }

        async function loadStats() {
            try {
                const resp = await apiFetch(API + "/api/stats");
                const data = await resp.json();
                if (data.success) {
                    animateValue("total-users", data.data.total_users);
                    animateValue("total-guilds", data.data.total_guilds);
                    animateValue("max-level", data.data.max_level);
                }
            } catch (e) { console.error("加载统计失败:", e); }
        }

        async function loadGuilds() {
            const panel = document.getElementById("guilds-panel");
            panel.innerHTML = '<div class="spinner"></div>';
            try {
                const resp = await apiFetch(API + "/api/guilds");
                const data = await resp.json();
                if (data.success && data.data.length) {
                    guildsData = data.data;
                    document.getElementById("guild-count").textContent = data.data.length;
                    panel.innerHTML = `<table><thead><tr><th>服务器</th><th>用户数</th><th>最高等级</th></tr></thead><tbody>
                        ${data.data.map(g => `<tr onclick="selectGuild('${g.guild_id}', this)" class="${currentGuildId === g.guild_id ? 'active' : ''}">
                            <td><div class="guild-name">${escapeHtml(g.guild_name || '未知服务器')}</div><div class="guild-id">${g.guild_id}</div></td>
                            <td>${g.user_count.toLocaleString()}</td>
                            <td><span class="level-tag">Lv ${g.max_level}</span></td>
                        </tr>`).join("")}</tbody></table>`;
                } else {
                    panel.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无服务器数据</div>';
                }
            } catch (e) {
                panel.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>加载失败</div>';
            }
        }

        // ==================== 排行榜 ====================
        function selectGuild(guildId, rowElement) {
            currentGuildId = guildId;
            document.getElementById("guild-id-input").value = guildId;
            document.querySelectorAll("#guilds-panel tbody tr").forEach(r => r.classList.remove("active"));
            if (rowElement) rowElement.classList.add("active");
            loadLeaderboard();
            loadSettings();
            document.getElementById("msg-guild-select").value = guildId;
            onMsgGuildChange();
        }

        async function loadLeaderboard() {
            const guildId = document.getElementById("guild-id-input").value.trim();
            if (!guildId) { showToast("请输入服务器 ID", "error"); return; }
            currentGuildId = guildId;
            const lbContent = document.getElementById("lb-content");
            lbContent.innerHTML = '<div class="spinner"></div>';
            try {
                const resp = await apiFetch(API + "/api/leaderboard/" + guildId);
                const data = await resp.json();
                if (data.success && data.data.length) {
                    document.getElementById("lb-count").style.display = "inline";
                    document.getElementById("lb-count").textContent = data.data.length;
                    const rankIcons = {1:'🥇',2:'🥈',3:'🥉'};
                    lbContent.innerHTML = `<table><thead><tr><th>#</th><th>用户</th><th>等级</th><th>XP</th><th>语音XP</th></tr></thead><tbody>
                        ${data.data.map(row => {
                            const icon = rankIcons[row.rank] || '';
                            const rc = row.rank <= 3 ? `rank-${row.rank}` : 'rank-other';
                            return `<tr><td><span class="rank-badge ${rc}">${icon || row.rank}</span></td>
                                <td><span class="guild-name">${escapeHtml(row.user_name || '未知用户')}</span><div class="guild-id">${row.user_id}</div></td>
                                <td><span class="level-tag">Lv ${row.level}</span></td>
                                <td>${row.xp.toLocaleString()}</td>
                                <td style="color:var(--text-muted)">${row.voice_xp.toLocaleString()}</td></tr>`;
                        }).join("")}</tbody></table>`;
                } else {
                    lbContent.innerHTML = '<div class="empty-state"><div class="icon">🔍</div>该服务器暂无数据</div>';
                    document.getElementById("lb-count").style.display = "none";
                }
            } catch (e) { lbContent.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>加载失败</div>'; }
        }

        // ==================== 消息发送 ====================
        function populateMsgGuildSelect() {
            const select = document.getElementById("msg-guild-select");
            const cv = select.value;
            select.innerHTML = '<option value="">-- 选择服务器 --</option>';
            if (guildsData.length === 0) {
                apiFetch(API + "/api/guilds").then(r => r.json()).then(d => {
                    if (d.success) { guildsData = d.data; populateMsgGuildSelect(); }
                });
                return;
            }
            guildsData.forEach(g => {
                const o = document.createElement("option");
                o.value = g.guild_id;
                o.textContent = `${g.guild_name || '未知服务器'} (${g.guild_id})`;
                select.appendChild(o);
            });
            if (cv) select.value = cv;
        }

        async function onMsgGuildChange() {
            const guildId = document.getElementById("msg-guild-select").value;
            const cs = document.getElementById("msg-channel-select");
            const preview = document.getElementById("guild-preview");
            if (!guildId) {
                cs.innerHTML = '<option value="">-- 先选服务器，再选频道 --</option>';
                preview.style.display = "none";
                document.getElementById("msg-guild-hint").textContent = "请先选择服务器";
                return;
            }
            currentGuildId = guildId;
            document.getElementById("msg-guild-hint").textContent = guildId;
            cs.innerHTML = '<option value="">加载频道中...</option>';
            loadGuildPreview(guildId);
            try {
                const resp = await apiFetch(API + "/api/guilds/" + guildId + "/channels");
                const data = await resp.json();
                if (data.success) {
                    availableChannels = data.data;
                    cs.innerHTML = '<option value="">-- 选择频道 --</option>';
                    data.data.forEach(ch => {
                        const o = document.createElement("option");
                        o.value = ch.id;
                        o.textContent = (ch.category ? `[${ch.category}] ` : "") + "#" + ch.name;
                        cs.appendChild(o);
                    });
                } else { cs.innerHTML = '<option value="">获取失败</option>'; }
            } catch (e) { cs.innerHTML = '<option value="">获取失败</option>'; }
        }

        async function loadGuildPreview(guildId) {
            try {
                const resp = await apiFetch(API + "/api/guilds/" + guildId + "/preview");
                const data = await resp.json();
                if (data.success) {
                    const g = data.data;
                    const preview = document.getElementById("guild-preview");
                    preview.style.display = "grid";
                    preview.innerHTML = `<div class="guild-preview-item"><div class="value">${g.member_count}</div><div class="label">成员</div></div>
                        <div class="guild-preview-item"><div class="value">${g.online_count}</div><div class="label">在线</div></div>
                        <div class="guild-preview-item"><div class="value">${g.text_channels}</div><div class="label">文字频道</div></div>
                        <div class="guild-preview-item"><div class="value">${g.voice_channels}</div><div class="label">语音频道</div></div>`;
                }
            } catch (e) {}
        }

        function onChannelChange() {
            const chId = document.getElementById("msg-channel-select").value;
            if (chId) {
                const ch = availableChannels.find(c => c.id === chId);
                document.getElementById("msg-guild-hint").textContent = ch ? "#" + ch.name : chId;
            }
        }

        function updateCharCount() {
            const len = document.getElementById("message-content").value.length;
            const el = document.getElementById("char-count");
            el.textContent = `${len} / 2000`;
            el.className = "char-count" + (len > 1800 ? " warn" : "") + (len > 1950 ? " danger" : "");
        }

        function toggleEmbed() {
            document.getElementById("embed-options").style.display = document.getElementById("embed-enabled").checked ? "grid" : "none";
        }

        function previewMessage() {
            const content = document.getElementById("message-content").value;
            const pd = document.getElementById("message-preview");
            pd.classList.add("show");
            document.getElementById("preview-content").textContent = content || "(空消息)";
            const embedOn = document.getElementById("embed-enabled").checked;
            const pe = document.getElementById("preview-embed");
            if (embedOn) {
                pe.style.display = "block";
                pe.style.borderLeftColor = document.getElementById("embed-color").value || "#00b4d8";
                document.getElementById("preview-embed-title").textContent = document.getElementById("embed-title").value || "(无标题)";
                document.getElementById("preview-embed-desc").textContent = document.getElementById("embed-description").value || "(无描述)";
                document.getElementById("preview-embed-footer").textContent = document.getElementById("embed-footer").value || "";
            } else { pe.style.display = "none"; }
        }

        async function sendMessage() {
            const channelId = document.getElementById("msg-channel-select").value;
            const content = document.getElementById("message-content").value.trim();
            if (!channelId) { showToast("请先选择频道", "error"); return; }
            if (!content) { showToast("请输入消息内容", "error"); return; }
            const btn = document.getElementById("send-btn");
            btn.disabled = true;
            btn.textContent = "发送中...";
            const embedOn = document.getElementById("embed-enabled").checked;
            const body = {
                channel_id: channelId,
                content: content,
                embed: embedOn ? {
                    enabled: true,
                    title: document.getElementById("embed-title").value,
                    description: document.getElementById("embed-description").value,
                    color: document.getElementById("embed-color").value,
                    footer: document.getElementById("embed-footer").value,
                    thumbnail_url: document.getElementById("embed-thumbnail").value
                } : { enabled: false }
            };
            try {
                const resp = await apiFetch(API + "/api/send-message", {
                    method: "POST",
                    body: JSON.stringify(body)
                });
                const data = await resp.json();
                if (data.success) {
                    showToast("✅ 消息已发送到 #" + data.data.channel_name, "success");
                    document.getElementById("message-content").value = "";
                    updateCharCount();
                    document.getElementById("message-preview").classList.remove("show");
                } else { showToast("❌ " + (data.error || "发送失败"), "error"); }
            } catch (e) { showToast("❌ 发送失败，请检查连接", "error"); }
            finally { btn.disabled = false; btn.textContent = "📨 发送消息"; }
        }

        // ==================== 设置 ====================
        async function loadSettings() {
            if (!currentGuildId) return;
            const panel = document.getElementById("settings-panel");
            document.getElementById("settings-guild-hint").textContent = currentGuildId;
            const guild = guildsData.find(g => g.guild_id === currentGuildId);
            const guildName = guild?.guild_name || currentGuildId;
            try {
                const resp = await apiFetch(API + "/api/settings/" + currentGuildId);
                const data = await resp.json();
                if (data.success) {
                    panel.innerHTML = `<div style="margin-bottom:16px;font-size:13px;color:var(--text-secondary);">正在编辑: <strong style="color:var(--text);">${escapeHtml(guildName)}</strong></div>
                        <div class="settings-row"><div><div class="settings-label">经验倍率</div><div class="settings-desc">消息获得的 XP 倍率 (0.1 - 10.0)</div></div>
                            <div style="display:flex;align-items:center;gap:8px;"><input type="number" class="settings-input" id="setting-xp-rate" value="${data.data.xp_rate || 1.0}" min="0.1" max="10.0" step="0.1"><span style="font-size:12px;color:var(--text-muted);">×</span></div></div>
                        <div class="settings-row"><div><div class="settings-label">语音经验倍率</div><div class="settings-desc">语音获得的 XP 倍率 (0.1 - 10.0)</div></div>
                            <div style="display:flex;align-items:center;gap:8px;"><input type="number" class="settings-input" id="setting-voice-xp-rate" value="${data.data.voice_xp_rate || 1.0}" min="0.1" max="10.0" step="0.1"><span style="font-size:12px;color:var(--text-muted);">×</span></div></div>
                        <button class="btn" onclick="saveSettings()" style="margin-top:16px;width:100%;">💾 保存设置</button>`;
                }
            } catch (e) { panel.innerHTML = '<div class="empty-state">加载设置失败</div>'; }
        }

        async function saveSettings() {
            if (!currentGuildId) return;
            const xpRate = document.getElementById("setting-xp-rate")?.value;
            const voiceXpRate = document.getElementById("setting-voice-xp-rate")?.value;
            try {
                const resp = await apiFetch(API + "/api/settings/" + currentGuildId, {
                    method: "POST",
                    body: JSON.stringify({ xp_rate: parseFloat(xpRate), voice_xp_rate: parseFloat(voiceXpRate) })
                });
                const data = await resp.json();
                showToast(data.success ? "设置已保存 ✓" : "保存失败: " + data.error, data.success ? "success" : "error");
            } catch (e) { showToast("保存失败，请检查连接", "error"); }
        }

        // ==================== 工具函数 ====================
        function animateValue(elementId, target) {
            const el = document.getElementById(elementId);
            const current = parseInt(el.textContent.replace(/,/g, '')) || 0;
            if (current === target) { el.textContent = target.toLocaleString(); return; }
            const duration = 600, start = performance.now();
            function update(now) {
                const p = Math.min((now - start) / duration, 1);
                el.textContent = Math.round(current + (target - current) * (1 - Math.pow(1 - p, 3))).toLocaleString();
                if (p < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function escapeHtml(str) {
            if (!str) return "";
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(message, type) {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = "toast " + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = "0"; toast.style.transition = "opacity 0.3s"; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // ==================== 启动 ====================
        initAuth();
    </script>
</body>
</html>
