<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBX Bot - 控制面板</title>
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #11161e;
            --surface-hover: #171d28;
            --border: #1c2333;
            --border-light: #252d3d;
            --cyan: #00b4d8;
            --cyan-glow: rgba(0,180,216,0.15);
            --pink: #e91e63;
            --gold: #f0a500;
            --text: #e2e8f0;
            --text-secondary: #8895a8;
            --text-muted: #546078;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --transition: 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh; -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -20%, rgba(0,180,216,0.06), transparent),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(233,30,99,0.04), transparent);
        }

        .lockscreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.4s, visibility 0.4s;
        }
        .lockscreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .lock-box {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 48px 40px; width: 400px; max-width: 90vw; text-align: center;
            box-shadow: 0 0 60px rgba(0,180,216,0.08);
        }
        .lock-icon { font-size: 48px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .lock-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .lock-title span { color: var(--cyan); }
        .lock-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
        .lock-input {
            width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text); font-size: 15px; text-align: center;
            letter-spacing: 4px; outline: none; transition: border-color var(--transition);
        }
        .lock-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,180,216,0.08); }
        .lock-input::placeholder { color: var(--text-muted); letter-spacing: 1px; }
        .lock-btn {
            width: 100%; margin-top: 16px; padding: 12px; border: none; border-radius: var(--radius-sm);
            background: var(--cyan); color: #000; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background var(--transition), transform 0.1s; letter-spacing: 0.5px;
        }
        .lock-btn:hover { background: #00c8ee; }
        .lock-btn:active { transform: scale(0.97); }
        .lock-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .lock-error { color: var(--danger); font-size: 12px; margin-top: 12px; min-height: 18px; }
        .lock-remember {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 16px; font-size: 12px; color: var(--text-muted); cursor: pointer;
        }

        .navbar {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 0 24px; height: 64px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }
        .navbar-brand { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
        .navbar-brand span {
            background: linear-gradient(135deg, var(--cyan), #0098b0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .navbar-actions { display: flex; align-items: center; gap: 12px; }
        .navbar-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .status-dot.online { background: var(--success); animation: pulse 2s infinite; }
        .status-dot.error { background: var(--danger); }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(46,204,113,0); }
        }
        .btn-icon {
            background: none; border: 1px solid var(--border); color: var(--text-secondary);
            padding: 6px 14px; border-radius: var(--radius-xs); cursor: pointer; font-size: 12px;
            transition: all var(--transition);
        }
        .btn-icon:hover { background: var(--surface-hover); border-color: var(--border-light); color: var(--text); }
        .btn-icon.online { border-color: var(--danger); color: var(--danger); }
        .btn-icon.online:hover { background: rgba(231,76,60,0.08); }
        .btn-icon.offline { border-color: var(--success); color: var(--success); }
        .btn-icon.offline:hover { background: rgba(46,204,113,0.08); }

        .container { max-width: 1320px; margin: 0 auto; padding: 24px 24px 64px; }

        .tabs {
            display: flex; gap: 4px; margin-bottom: 28px; background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--radius); padding: 4px;
        }
        .tab {
            flex: 1; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all var(--transition); text-align: center; color: var(--text-muted);
            background: transparent; border: none;
        }
        .tab:hover { color: var(--text-secondary); }
        .tab.active { background: var(--cyan-glow); color: var(--cyan); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px 24px; transition: all var(--transition); position: relative; overflow: hidden;
        }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; }
        .stat-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: var(--shadow); }
        .stat-card:nth-child(1)::after { background: var(--cyan); }
        .stat-card:nth-child(2)::after { background: var(--pink); }
        .stat-card:nth-child(3)::after { background: var(--gold); }
        .stat-card:nth-child(4)::after { background: var(--success); }
        .stat-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
        .stat-value { font-size: 34px; font-weight: 700; letter-spacing: -1px; }
        .stat-card:nth-child(1) .stat-value { color: var(--cyan); }
        .stat-card:nth-child(2) .stat-value { color: var(--pink); }
        .stat-card:nth-child(3) .stat-value { color: var(--gold); }
        .stat-card:nth-child(4) .stat-value { color: var(--success); }

        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .content-grid.single { grid-template-columns: 1fr; }
        .panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
        }
        .panel.full-width { grid-column: 1 / -1; }
        .panel-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
        }
        .panel-header .badge {
            font-size: 10px; background: var(--cyan-glow); color: var(--cyan);
            padding: 3px 10px; border-radius: 20px; font-weight: 600;
        }
        .panel-body { padding: 12px 20px 20px; max-height: 480px; overflow-y: auto; }
        .panel-body::-webkit-scrollbar { width: 4px; }
        .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; }
        th {
            font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.6px; padding: 8px 10px; text-align: left; border-bottom: 2px solid var(--border);
            position: sticky; top: 0; background: var(--surface); z-index: 1;
        }
        td { padding: 10px 10px; font-size: 13px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tbody tr { cursor: pointer; transition: background 0.15s; }
        tbody tr:hover td { background: rgba(255,255,255,0.03); }
        tbody tr.active td { background: rgba(0,180,216,0.06); }
        .guild-id { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11px; color: var(--text-secondary); }
        .guild-name { font-weight: 500; }
        .level-tag { display: inline-block; background: rgba(0,180,216,0.12); color: var(--cyan); padding: 2px 10px; border-radius: 20px; font-weight: 600; font-size: 11px; }
        .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 7px; font-weight: 700; font-size: 12px; }
        .rank-1 { background: rgba(240,165,0,0.2); color: var(--gold); }
        .rank-2 { background: rgba(192,192,192,0.15); color: #c0c0c0; }
        .rank-3 { background: rgba(205,127,50,0.15); color: #cd7f32; }
        .rank-other { color: var(--text-muted); }

        .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .toolbar input, .toolbar select {
            flex: 1; min-width: 120px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 9px 12px; border-radius: var(--radius-xs); font-size: 13px;
            font-family: inherit; outline: none; transition: border-color var(--transition);
        }
        .toolbar input:focus, .toolbar select:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,180,216,0.08); }
        .toolbar input::placeholder { color: var(--text-muted); }
        .toolbar select option { background: var(--surface); color: var(--text); }

        .btn {
            padding: 9px 16px; border-radius: var(--radius-xs); font-size: 12px; font-weight: 600;
            cursor: pointer; border: none; background: var(--cyan); color: #000; letter-spacing: 0.3px;
            transition: all var(--transition); white-space: nowrap;
        }
        .btn:hover { background: #00c8ee; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-outline:hover { background: var(--surface-hover); border-color: var(--border-light); color: var(--text); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #3ddb84; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #f05050; }
        .btn-sm { padding: 5px 10px; font-size: 11px; }

        textarea {
            width: 100%; min-height: 80px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 10px; border-radius: var(--radius-xs); font-size: 13px;
            font-family: inherit; resize: vertical; outline: none; transition: border-color var(--transition);
        }
        textarea:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,180,216,0.08); }
        .char-count { text-align: right; font-size: 10px; color: var(--text-muted); margin-top: 4px; }
        .char-count.warn { color: var(--warning); }
        .char-count.danger { color: var(--danger); }
        .mention-suggestions {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xs);
            max-height: 150px; overflow-y: auto; display: none; position: absolute; z-index: 10;
            width: 250px; box-shadow: var(--shadow);
        }
        .mention-suggestions.show { display: block; }
        .mention-item {
            padding: 8px 12px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 8px;
            transition: background 0.1s;
        }
        .mention-item:hover { background: var(--cyan-glow); }
        .mention-item img { width: 20px; height: 20px; border-radius: 50%; }

        .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .toggle { position: relative; width: 38px; height: 20px; }
        .toggle input { display: none; }
        .toggle-slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--border); border-radius: 20px; transition: var(--transition);
        }
        .toggle-slider:before {
            content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background: var(--text-muted); border-radius: 50%; transition: var(--transition);
        }
        .toggle input:checked + .toggle-slider { background: var(--cyan); }
        .toggle input:checked + .toggle-slider:before { transform: translateX(18px); background: #fff; }

        .embed-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .embed-options input {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 7px 10px; border-radius: var(--radius-xs); font-size: 12px; outline: none; width: 100%;
        }
        .embed-options input:focus { border-color: var(--cyan); }
        .embed-options label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; display: block; }

        .message-preview {
            margin-top: 12px; padding: 14px; background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-xs); display: none;
        }
        .message-preview.show { display: block; }
        .preview-embed {
            background: #1a1c20; border-left: 4px solid var(--cyan); border-radius: 6px;
            padding: 10px 14px; margin-top: 10px;
        }
        .preview-embed-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .preview-embed-desc { font-size: 12px; color: var(--text-secondary); }
        .preview-embed-footer { font-size: 10px; color: var(--text-muted); margin-top: 6px; }

        .msg-history-item {
            padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px;
            display: flex; gap: 10px; align-items: flex-start;
        }
        .msg-history-item:last-child { border-bottom: none; }
        .msg-history-avatar {
            width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background: var(--border);
        }
        .msg-history-content { flex: 1; min-width: 0; }
        .msg-history-author { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
        .msg-history-text { color: var(--text-secondary); word-break: break-word; }
        .msg-history-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        .settings-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px;
        }
        .settings-row:last-child { border-bottom: none; }
        .settings-label { font-size: 13px; font-weight: 500; }
        .settings-desc { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .settings-input {
            width: 80px; background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 7px 8px; border-radius: var(--radius-xs); font-size: 12px; text-align: center;
            outline: none; font-family: 'SF Mono', 'Fira Code', monospace; flex-shrink: 0;
        }
        .settings-input:focus { border-color: var(--cyan); }

        .guild-preview {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px;
        }
        .guild-preview-item {
            background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-xs);
            padding: 10px 14px; text-align: center;
        }
        .guild-preview-item .value { font-size: 20px; font-weight: 700; color: var(--cyan); }
        .guild-preview-item .label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; letter-spacing: 0.5px; }

        .danger-zone {
            border: 1px solid rgba(231,76,60,0.3); border-radius: var(--radius); padding: 16px; margin-top: 16px;
        }
        .danger-zone-title { color: var(--danger); font-weight: 600; font-size: 13px; margin-bottom: 8px; }

        .empty-state { text-align: center; padding: 40px 16px; color: var(--text-muted); font-size: 13px; }
        .empty-state .icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }

        .spinner {
            width: 22px; height: 22px; border: 2px solid var(--border);
            border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 6px; }
        .toast {
            padding: 10px 16px; border-radius: var(--radius-xs); font-size: 12px; font-weight: 500;
            animation: slideUp 0.3s ease; box-shadow: var(--shadow); max-width: 360px;
        }
        .toast.success { background: #1a3a2a; color: var(--success); border: 1px solid rgba(46,204,113,0.3); }
        .toast.error { background: #3a1a1a; color: var(--danger); border: 1px solid rgba(231,76,60,0.3); }
        .toast.info { background: #1a2a3a; color: var(--cyan); border: 1px solid rgba(0,180,216,0.3); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .content-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-value { font-size: 26px; }
            .container { padding: 12px; }
            .navbar { padding: 0 12px; }
            .tabs { flex-wrap: wrap; }
            .tab { flex: 1 1 auto; font-size: 11px; padding: 8px 10px; }
            .guild-preview { grid-template-columns: 1fr 1fr; }
            .embed-options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 锁屏 -->
    <div class="lockscreen" id="lockscreen">
        <div class="lock-box">
            <div class="lock-icon">🔐</div>
            <div class="lock-title">FBX<span>Bot</span> 控制面板</div>
            <div class="lock-subtitle">请输入访问密码</div>
            <input type="password" class="lock-input" id="password-input" placeholder="••••••" autocomplete="current-password" maxlength="64" onkeydown="if(event.key==='Enter')unlock()">
            <button class="lock-btn" id="lock-btn" onclick="unlock()">🔓 解锁</button>
            <label class="lock-remember"><input type="checkbox" id="remember-checkbox" checked> 记住我（下次自动登录）</label>
            <div class="lock-error" id="lock-error"></div>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">FBX<span>Bot</span></div>
        <div class="navbar-actions">
            <div class="navbar-status">
                <div class="status-dot" id="dot"></div>
                <span id="status-text">连接中...</span>
            </div>
            <button class="btn-icon online" id="btn-toggle-bot" onclick="toggleBot()" title="停止/启动 Bot">⏹ 停止</button>
            <button class="btn-icon" onclick="lockScreen()" title="锁定面板">🔒</button>
        </div>
    </nav>

    <div class="container" id="main-content">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('dashboard')">📊 仪表盘</button>
            <button class="tab" onclick="switchTab('messenger')">💬 消息发送</button>
            <button class="tab" onclick="switchTab('history')">📜 频道消息</button>
            <button class="tab" onclick="switchTab('settings')">⚙️ 设置</button>
        </div>

        <!-- 仪表盘 -->
        <div class="tab-content active" id="tab-dashboard">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">📊 总用户</div><div class="stat-value" id="total-users">--</div></div>
                <div class="stat-card"><div class="stat-label">🌐 服务器</div><div class="stat-value" id="total-guilds">--</div></div>
                <div class="stat-card"><div class="stat-label">🏆 最高等级</div><div class="stat-value" id="max-level">--</div></div>
                <div class="stat-card"><div class="stat-label">💚 Bot 状态</div><div class="stat-value" style="font-size:16px;" id="bot-status">在线</div></div>
            </div>
            <div class="content-grid">
                <div class="panel">
                    <div class="panel-header">服务器列表<span class="badge" id="guild-count">0</span></div>
                    <div class="panel-body" id="guilds-panel"><div class="spinner"></div></div>
                </div>
                <div class="panel">
                    <div class="panel-header">排行榜<span class="badge" id="lb-count" style="display:none">0</span></div>
                    <div class="panel-body">
                        <div class="toolbar">
                            <input type="text" id="guild-id-input" placeholder="输入服务器 ID">
                            <button class="btn" onclick="loadLeaderboard()">🔍 查询</button>
                        </div>
                        <div id="lb-content"><div class="empty-state"><div class="icon">📋</div>点击左侧或输入 ID 查看</div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 消息发送 -->
        <div class="tab-content" id="tab-messenger">
            <div class="content-grid single">
                <div class="panel full-width">
                    <div class="panel-header">💬 通过 Bot 发送消息<span class="badge" id="msg-guild-hint">请先选择服务器</span></div>
                    <div class="panel-body">
                        <div class="toolbar">
                            <select id="msg-guild-select" onchange="onMsgGuildChange()"><option value="">-- 选择服务器 --</option></select>
                            <select id="msg-channel-select" onchange="onChannelChange()"><option value="">-- 先选服务器 --</option></select>
                            <button class="btn btn-outline btn-sm" onclick="loadChannelHistory()">📜 最近消息</button>
                        </div>
                        <div class="guild-preview" id="guild-preview" style="display:none;"></div>
                        <div style="position:relative;">
                            <textarea id="message-content" placeholder="输入消息内容... 输入 @ 提及用户" maxlength="2000" oninput="updateCharCount();handleMentionInput()" onkeydown="handleMentionKey(event)"></textarea>
                            <div class="mention-suggestions" id="mention-suggestions"></div>
                        </div>
                        <div class="char-count" id="char-count">0 / 2000</div>
                        <div class="toggle-row">
                            <label class="toggle"><input type="checkbox" id="embed-enabled" onchange="toggleEmbed()"><span class="toggle-slider"></span></label>
                            <span style="font-size:12px;color:var(--text-secondary);">附加 Embed</span>
                        </div>
                        <div class="embed-options" id="embed-options" style="display:none;">
                            <div><label>标题</label><input type="text" id="embed-title" placeholder="Embed 标题" maxlength="256"></div>
                            <div><label>颜色</label><input type="text" id="embed-color" placeholder="#00b4d8" value="#00b4d8" maxlength="7"></div>

                            <div><label>页脚</label><input type="text" id="embed-footer" placeholder="页脚" maxlength="2048"></div>
                            <div><label>缩略图 URL</label><input type="text" id="embed-thumbnail" placeholder="https://..."></div>
                        </div>
                        <div style="display:flex;gap:8px;margin-top:14px;">
                            <button class="btn btn-success" onclick="sendMessage()" id="send-btn">📨 发送</button>
                            <button class="btn btn-outline" onclick="previewMessage()">👁 预览</button>
                        </div>
                        <div class="message-preview" id="message-preview">
                            <div style="font-size:10px;color:var(--text-muted);margin-bottom:6px;">预览</div>
                            <div id="preview-content" style="color:var(--text);font-size:13px;white-space:pre-wrap;"></div>
                            <div class="preview-embed" id="preview-embed" style="display:none;">
                                <div class="preview-embed-title" id="preview-embed-title"></div>
                                <div class="preview-embed-desc" id="preview-embed-desc"></div>
                                <div class="preview-embed-footer" id="preview-embed-footer"></div>
                            </div>
                        </div>
                        <div id="recent-messages" style="margin-top:12px;display:none;">
                            <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">📜 最近消息</div>
                            <div id="recent-messages-list" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-xs);"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 频道消息历史 -->
        <div class="tab-content" id="tab-history">
            <div class="content-grid single">
                <div class="panel full-width">
                    <div class="panel-header">📜 查看频道消息<span class="badge" id="history-guild-hint">选择服务器和频道</span></div>
                    <div class="panel-body">
                        <div class="toolbar">
                            <select id="history-guild-select" onchange="onHistoryGuildChange()"><option value="">-- 选择服务器 --</option></select>
                            <select id="history-channel-select"><option value="">-- 先选服务器 --</option></select>
                            <input type="number" id="history-limit" value="20" min="1" max="100" style="width:70px;min-width:70px;flex:none;" title="获取条数">
                            <button class="btn" onclick="loadHistoryMessages()">🔍 加载</button>
                        </div>
                        <div id="history-messages" style="max-height:500px;overflow-y:auto;">
                            <div class="empty-state"><div class="icon">📜</div>选择服务器和频道，点击加载</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 设置 -->
        <div class="tab-content" id="tab-settings">
            <div class="content-grid single">
                <div class="panel full-width">
                    <div class="panel-header">⚙️ 服务器设置<span class="badge" id="settings-guild-hint">请先选择服务器</span></div>
                    <div class="panel-body" id="settings-panel">
                        <div class="empty-state"><div class="icon">🔒</div>在仪表盘中选择一个服务器</div>
                    </div>
                </div>
                <div class="panel full-width">
                    <div class="panel-header">⚠️ 危险区域</div>
                    <div class="panel-body">
                        <div class="danger-zone">
                            <div class="danger-zone-title" id="danger-title">⏹ 停止 Bot</div>
                            <p style="font-size:11px;color:var(--text-muted);margin-bottom:10px;" id="danger-desc">
                                这将断开 Bot 与 Discord 的连接。Bot 进程将继续运行但不再响应。
                            </p>
                            <button class="btn btn-danger btn-sm" id="danger-btn" onclick="toggleBot()">停止 Bot</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        const API = "https://web--arcane--d9n9n2zg4zh5.code.run";
        const STORAGE_KEY = "fbxbot_auth_token";
        const REMEMBER_KEY = "fbxbot_remember";

        let currentGuildId = null;
        let guildsData = [];
        let availableChannels = [];
        let mentionMembers = [];
        let mentionIndex = -1;
        let botOnline = true;

        // ==================== API ====================
        function getToken() { return localStorage.getItem(STORAGE_KEY); }

        async function apiFetch(url, options = {}) {
            const token = getToken();
            const headers = { ...(options.headers || {}) };
            if (token) headers["Authorization"] = "Bearer " + token;
            if (options.body && typeof options.body === "string" && !headers["Content-Type"])
                headers["Content-Type"] = "application/json";
            return fetch(url, { ...options, headers });
        }

        // ==================== 密码 ====================
        async function initAuth() {
            const remember = localStorage.getItem(REMEMBER_KEY);
            const storedToken = localStorage.getItem(STORAGE_KEY);
            if (remember === "true" && storedToken) {
                const valid = await verifyToken(storedToken);
                if (valid) { document.getElementById("lockscreen").classList.add("hidden"); initApp(); return; }
                else localStorage.removeItem(STORAGE_KEY);
            }
            document.getElementById("lockscreen").classList.remove("hidden");
            document.getElementById("password-input").focus();
        }

        async function verifyToken(token) {
            try {
                const resp = await apiFetch(API + "/api/verify-token", { headers: { "Authorization": "Bearer " + token } });
                return (await resp.json()).success === true;
            } catch (e) { return false; }
        }

        async function unlock() {
            const pw = document.getElementById("password-input").value.trim();
            const err = document.getElementById("lock-error");
            const btn = document.getElementById("lock-btn");
            const remember = document.getElementById("remember-checkbox").checked;
            if (!pw) { err.textContent = "请输入密码"; return; }
            btn.disabled = true; btn.textContent = "验证中..."; err.textContent = "";
            try {
                const resp = await fetch(API + "/api/auth", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: pw })
                });
                const data = await resp.json();
                if (data.success) {
                    document.getElementById("lockscreen").classList.add("hidden");
                    localStorage.setItem(STORAGE_KEY, data.token);
                    localStorage.setItem(REMEMBER_KEY, remember ? "true" : "false");
                    initApp();
                } else {
                    err.textContent = data.error || "密码错误";
                    document.getElementById("password-input").value = "";
                    document.getElementById("password-input").focus();
                }
            } catch (e) { err.textContent = "连接失败"; }
            finally { btn.disabled = false; btn.textContent = "🔓 解锁"; }
        }

        function lockScreen() {
            if (localStorage.getItem(REMEMBER_KEY) !== "true") localStorage.removeItem(STORAGE_KEY);
            document.getElementById("lockscreen").classList.remove("hidden");
            document.getElementById("password-input").value = "";
            document.getElementById("lock-error").textContent = "";
            document.getElementById("password-input").focus();
        }

        // ==================== Bot 开关 ====================
        function updateBotToggleButton() {
            const btn = document.getElementById("btn-toggle-bot");
            const dangerBtn = document.getElementById("danger-btn");
            const dangerTitle = document.getElementById("danger-title");
            const dangerDesc = document.getElementById("danger-desc");
            if (botOnline) {
                btn.textContent = "⏹ 停止"; btn.className = "btn-icon online";
                if (dangerBtn) { dangerBtn.textContent = "停止 Bot"; dangerBtn.className = "btn btn-danger btn-sm"; }
                if (dangerTitle) dangerTitle.textContent = "⏹ 停止 Bot";
                if (dangerDesc) dangerDesc.textContent = "这将断开 Bot 与 Discord 的连接。Bot 进程将继续运行但不再响应。";
            } else {
                btn.textContent = "▶ 启动"; btn.className = "btn-icon offline";
                if (dangerBtn) { dangerBtn.textContent = "启动 Bot"; dangerBtn.className = "btn btn-success btn-sm"; }
                if (dangerTitle) dangerTitle.textContent = "▶ 启动 Bot";
                if (dangerDesc) dangerDesc.textContent = "Bot 当前离线，点击启动重新连接 Discord。";
            }
        }

        function updateStatusDisplay() {
            const dot = document.getElementById("dot");
            const st = document.getElementById("status-text");
            const bs = document.getElementById("bot-status");
            if (botOnline) {
                dot.className = "status-dot online"; st.textContent = "已连接";
                bs.textContent = "在线"; bs.style.color = "var(--success)";
            } else {
                dot.className = "status-dot error"; st.textContent = "已停止";
                bs.textContent = "离线"; bs.style.color = "var(--danger)";
            }
        }

        async function checkBotStatus() {
            try {
                const resp = await apiFetch(API + "/api/bot-status");
                const data = await resp.json();
                if (data.success) {
                    botOnline = data.data.is_ready;
                    updateBotToggleButton();
                    updateStatusDisplay();
                }
            } catch (e) {}
        }

        async function toggleBot() {
            if (botOnline) {
                if (!confirm("确定要停止 Bot 吗？")) return;
                try {
                    const resp = await apiFetch(API + "/api/stop-bot", { method: "POST" });
                    const data = await resp.json();
                    if (data.success) {
                        botOnline = false;
                        updateBotToggleButton();
                        updateStatusDisplay();
                        showToast("✅ Bot 已停止", "success");
                    } else showToast("❌ " + (data.error || "失败"), "error");
                } catch (e) { showToast("请求失败", "error"); }
            } else {
                try {
                    const resp = await apiFetch(API + "/api/start-bot", { method: "POST" });
                    const data = await resp.json();
                    if (data.success) {
                        showToast("🔄 Bot 正在启动...", "info");
                        let attempts = 0;
                        const poll = setInterval(async () => {
                            attempts++;
                            try {
                                const sr = await apiFetch(API + "/api/bot-status");
                                const sd = await sr.json();
                                if (sd.success && sd.data.is_ready) {
                                    clearInterval(poll);
                                    botOnline = true;
                                    updateBotToggleButton();
                                    updateStatusDisplay();
                                    showToast("✅ Bot 已重新上线", "success");
                                    loadAll();
                                } else if (attempts >= 25) {
                                    clearInterval(poll);
                                    showToast("⚠️ 启动超时，请刷新查看", "error");
                                }
                            } catch (e) {}
                        }, 2000);
                    } else showToast("❌ " + (data.error || "失败"), "error");
                } catch (e) { showToast("请求失败", "error"); }
            }
        }

        // ==================== 初始化 ====================
        async function initApp() {
            await checkBotStatus();
            try {
                const resp = await apiFetch(API + "/api/health");
                const data = await resp.json();
                botOnline = data.success && data.bot_connected;
                updateBotToggleButton();
                updateStatusDisplay();
                loadAll();
            } catch (e) {
                botOnline = false;
                updateBotToggleButton();
                updateStatusDisplay();
                setTimeout(initApp, 5000);
            }
        }

        // ==================== Tab ====================
        function switchTab(name) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add("active");
            document.getElementById("tab-" + name).classList.add("active");
            if (name === "messenger") populateMsgGuildSelect();
            if (name === "history") populateHistoryGuildSelect();
            if (name === "settings" && currentGuildId) loadSettings();
        }

        // ==================== 数据加载 ====================
        async function loadAll() { await Promise.all([loadStats(), loadGuilds()]); }

        async function loadStats() {
            try {
                const resp = await apiFetch(API + "/api/stats");
                const data = await resp.json();
                if (data.success) {
                    animateValue("total-users", data.data.total_users);
                    animateValue("total-guilds", data.data.total_guilds);
                    animateValue("max-level", data.data.max_level);
                }
            } catch (e) {}
        }

        async function loadGuilds() {
            const panel = document.getElementById("guilds-panel");
            panel.innerHTML = '<div class="spinner"></div>';
            try {
                const resp = await apiFetch(API + "/api/guilds");
                const data = await resp.json();
                if (data.success && data.data.length) {
                    guildsData = data.data;
                    document.getElementById("guild-count").textContent = data.data.length;
                    panel.innerHTML = `<table><thead><tr><th>服务器</th><th>用户</th><th>最高等级</th></tr></thead><tbody>
                        ${data.data.map(g => `<tr onclick="selectGuild('${g.guild_id}', this)" class="${currentGuildId===g.guild_id?'active':''}">
                            <td><div class="guild-name">${esc(g.guild_name||'未知')}</div><div class="guild-id">${g.guild_id}</div></td>
                            <td>${g.user_count.toLocaleString()}</td>
                            <td><span class="level-tag">Lv ${g.max_level}</span></td>
                        </tr>`).join("")}</tbody></table>`;
                } else panel.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无数据</div>';
            } catch (e) { panel.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>加载失败</div>'; }
        }

        function selectGuild(guildId, rowElement) {
            currentGuildId = guildId;
            document.getElementById("guild-id-input").value = guildId;
            document.querySelectorAll("#guilds-panel tbody tr").forEach(r => r.classList.remove("active"));
            if (rowElement) rowElement.classList.add("active");
            loadLeaderboard(); loadSettings();
            document.getElementById("msg-guild-select").value = guildId;
            onMsgGuildChange();
        }

        async function loadLeaderboard() {
            const gid = document.getElementById("guild-id-input").value.trim();
            if (!gid) { showToast("请输入服务器 ID", "error"); return; }
            currentGuildId = gid;
            const lb = document.getElementById("lb-content");
            lb.innerHTML = '<div class="spinner"></div>';
            try {
                const resp = await apiFetch(API + "/api/leaderboard/" + gid);
                const data = await resp.json();
                if (data.success && data.data.length) {
                    document.getElementById("lb-count").style.display = "inline";
                    document.getElementById("lb-count").textContent = data.data.length;
                    const icons = {1:'🥇',2:'🥈',3:'🥉'};
                    lb.innerHTML = `<table><thead><tr><th>#</th><th>用户</th><th>等级</th><th>XP</th><th>语音XP</th></tr></thead><tbody>
                        ${data.data.map(r => `<tr><td><span class="rank-badge ${r.rank<=3?'rank-'+r.rank:'rank-other'}">${icons[r.rank]||r.rank}</span></td>
                            <td><span class="guild-name">${esc(r.user_name||'未知')}</span><div class="guild-id">${r.user_id}</div></td>
                            <td><span class="level-tag">Lv ${r.level}</span></td><td>${r.xp.toLocaleString()}</td>
                            <td style="color:var(--text-muted)">${r.voice_xp.toLocaleString()}</td></tr>`).join("")}</tbody></table>`;
                } else { lb.innerHTML = '<div class="empty-state"><div class="icon">🔍</div>暂无数据</div>'; document.getElementById("lb-count").style.display="none"; }
            } catch (e) { lb.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>加载失败</div>'; }
        }

        // ==================== 消息发送 ====================
        function populateMsgGuildSelect() {
            const sel = document.getElementById("msg-guild-select");
            const cv = sel.value;
            sel.innerHTML = '<option value="">-- 选择服务器 --</option>';
            if (!guildsData.length) { apiFetch(API+"/api/guilds").then(r=>r.json()).then(d=>{if(d.success){guildsData=d.data;populateMsgGuildSelect();}}); return; }
            guildsData.forEach(g => { const o=document.createElement("option"); o.value=g.guild_id; o.textContent=`${g.guild_name||'未知'} (${g.guild_id})`; sel.appendChild(o); });
            if (cv) sel.value = cv;
        }

        async function onMsgGuildChange() {
            const gid = document.getElementById("msg-guild-select").value;
            const cs = document.getElementById("msg-channel-select");
            const preview = document.getElementById("guild-preview");
            if (!gid) { cs.innerHTML='<option value="">-- 先选服务器 --</option>'; preview.style.display="none"; document.getElementById("msg-guild-hint").textContent="请先选择服务器"; return; }
            currentGuildId = gid;
            document.getElementById("msg-guild-hint").textContent = gid;
            cs.innerHTML = '<option value="">加载中...</option>';
            loadGuildPreview(gid);
            loadMentionMembers(gid);
            try {
                const resp = await apiFetch(API + "/api/guilds/" + gid + "/channels");
                const data = await resp.json();
                if (data.success) {
                    availableChannels = data.data;
                    cs.innerHTML = '<option value="">-- 选择频道 --</option>';
                    data.data.forEach(ch => { const o=document.createElement("option"); o.value=ch.id; o.textContent=(ch.category?`[${ch.category}] `:"")+"#"+ch.name; cs.appendChild(o); });
                } else cs.innerHTML = '<option value="">获取失败</option>';
            } catch (e) { cs.innerHTML = '<option value="">获取失败</option>'; }
        }

        async function loadGuildPreview(gid) {
            try {
                const resp = await apiFetch(API + "/api/guilds/" + gid + "/preview");
                const data = await resp.json();
                if (data.success) {
                    const g = data.data;
                    document.getElementById("guild-preview").style.display = "grid";
                    document.getElementById("guild-preview").innerHTML = `
                        <div class="guild-preview-item"><div class="value">${g.member_count}</div><div class="label">成员</div></div>
                        <div class="guild-preview-item"><div class="value">${g.online_count}</div><div class="label">在线</div></div>
                        <div class="guild-preview-item"><div class="value">${g.text_channels}</div><div class="label">文字频道</div></div>
                        <div class="guild-preview-item"><div class="value">${g.voice_channels}</div><div class="label">语音频道</div></div>`;
                }
            } catch (e) {}
        }

        async function loadMentionMembers(gid) {
            try {
                const resp = await apiFetch(API + "/api/guilds/" + gid + "/members");
                const data = await resp.json();
                if (data.success) mentionMembers = data.data;
            } catch (e) { mentionMembers = []; }
        }

        function onChannelChange() {
            const cid = document.getElementById("msg-channel-select").value;
            if (cid) {
                const ch = availableChannels.find(c => c.id === cid);
                document.getElementById("msg-guild-hint").textContent = ch ? "#" + ch.name : cid;
            }
        }

        // ==================== @提及 ====================
        function handleMentionInput() {
            const ta = document.getElementById("message-content");
            const val = ta.value;
            const cursorPos = ta.selectionStart;
            const textBeforeCursor = val.substring(0, cursorPos);
            const atMatch = textBeforeCursor.match(/@(\S*)$/);
            const suggestions = document.getElementById("mention-suggestions");

            if (atMatch && mentionMembers.length > 0) {
                const query = atMatch[1].toLowerCase();
                const filtered = mentionMembers.filter(m =>
                    m.display_name.toLowerCase().includes(query) || m.username.toLowerCase().includes(query)
                ).slice(0, 8);
                if (filtered.length > 0) {
                    mentionIndex = -1;
                    suggestions.innerHTML = filtered.map((m, i) =>
                        `<div class="mention-item" data-index="${i}" data-id="${m.id}" data-name="${m.display_name}" onmousedown="insertMention(this)">
                            <img src="${m.avatar_url || ''}" onerror="this.style.display='none'" alt="">
                            <span>${esc(m.display_name)}</span>
                            <span style="color:var(--text-muted);font-size:10px;">@${esc(m.username)}</span>
                        </div>`
                    ).join("");
                    suggestions.classList.add("show");
                    return;
                }
            }
            suggestions.classList.remove("show");
            mentionIndex = -1;
        }

        function handleMentionKey(event) {
            const suggestions = document.getElementById("mention-suggestions");
            if (!suggestions.classList.contains("show")) return;
            const items = suggestions.querySelectorAll(".mention-item");
            if (event.key === "ArrowDown") { event.preventDefault(); mentionIndex = Math.min(mentionIndex+1, items.length-1); updateMentionHighlight(items); }
            else if (event.key === "ArrowUp") { event.preventDefault(); mentionIndex = Math.max(mentionIndex-1, 0); updateMentionHighlight(items); }
            else if (event.key === "Enter" && mentionIndex >= 0) { event.preventDefault(); insertMention(items[mentionIndex]); }
            else if (event.key === "Escape") { suggestions.classList.remove("show"); mentionIndex = -1; }
        }

        function updateMentionHighlight(items) {
            items.forEach((item, i) => { item.style.background = i === mentionIndex ? "var(--cyan-glow)" : ""; });
        }

        function insertMention(el) {
            const ta = document.getElementById("message-content");
            const val = ta.value;
            const cursorPos = ta.selectionStart;
            const before = val.substring(0, cursorPos);
            const after = val.substring(cursorPos);
            ta.value = before.replace(/@\S*$/, `<@${el.dataset.id}> `) + after;
            document.getElementById("mention-suggestions").classList.remove("show");
            mentionIndex = -1;
            ta.focus();
            updateCharCount();
        }

        function updateCharCount() {
            const len = document.getElementById("message-content").value.length;
            const el = document.getElementById("char-count");
            el.textContent = `${len} / 2000`;
            el.className = "char-count" + (len>1800?" warn":"") + (len>1950?" danger":"");
        }

        function toggleEmbed() {
            document.getElementById("embed-options").style.display = document.getElementById("embed-enabled").checked ? "grid" : "none";
        }

        function previewMessage() {
            const content = document.getElementById("message-content").value;
            document.getElementById("message-preview").classList.add("show");
            document.getElementById("preview-content").textContent = content || "(空消息)";
            const pe = document.getElementById("preview-embed");
            if (document.getElementById("embed-enabled").checked) {
                pe.style.display = "block";
                pe.style.borderLeftColor = document.getElementById("embed-color").value || "#00b4d8";
                document.getElementById("preview-embed-title").textContent = document.getElementById("embed-title").value || "(无标题)";
                document.getElementById("preview-embed-desc").textContent = document.getElementById("embed-description").value || "(无描述)";
                document.getElementById("preview-embed-footer").textContent = document.getElementById("embed-footer").value || "";
            } else pe.style.display = "none";
        }

        async function sendMessage() {
            const cid = document.getElementById("msg-channel-select").value;
            const content = document.getElementById("message-content").value.trim();
            if (!cid) { showToast("请选择频道","error"); return; }
            if (!content) { showToast("请输入内容","error"); return; }
            const btn = document.getElementById("send-btn");
            btn.disabled = true; btn.textContent = "发送中...";
            try {
                const resp = await apiFetch(API + "/api/send-message", {
                    method: "POST",
                    body: JSON.stringify({
                        channel_id: cid, content,
                        embed: document.getElementById("embed-enabled").checked ? {
                            enabled: true,
                            title: document.getElementById("embed-title").value,
                            description: document.getElementById("embed-description").value,
                            color: document.getElementById("embed-color").value,
                            footer: document.getElementById("embed-footer").value,
                            thumbnail_url: document.getElementById("embed-thumbnail").value
                        } : { enabled: false }
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    showToast("✅ 已发送到 #" + data.data.channel_name, "success");
                    document.getElementById("message-content").value = "";
                    updateCharCount();
                    document.getElementById("message-preview").classList.remove("show");
                } else showToast("❌ " + (data.error || "失败"), "error");
            } catch (e) { showToast("发送失败","error"); }
            finally { btn.disabled = false; btn.textContent = "📨 发送"; }
        }

        async function loadChannelHistory() {
            const gid = document.getElementById("msg-guild-select").value;
            const cid = document.getElementById("msg-channel-select").value;
            if (!gid || !cid) { showToast("请先选择服务器和频道","error"); return; }
            try {
                const resp = await apiFetch(API + `/api/channels/${cid}/messages?limit=10`);
                const data = await resp.json();
                if (data.success && data.data.length) {
                    document.getElementById("recent-messages").style.display = "block";
                    document.getElementById("recent-messages-list").innerHTML = data.data.reverse().map(m => `
                        <div class="msg-history-item">
                            <img class="msg-history-avatar" src="${m.avatar_url || ''}" onerror="this.style.display='none'" alt="">
                            <div class="msg-history-content">
                                <div class="msg-history-author" style="color:${m.color || 'var(--text)'};">${esc(m.author)}</div>
                                <div class="msg-history-text">${esc(m.content).substring(0,300)}</div>
                                <div class="msg-history-time">${m.timestamp}</div>
                            </div>
                        </div>`).join("");
                } else {
                    document.getElementById("recent-messages").style.display = "block";
                    document.getElementById("recent-messages-list").innerHTML = '<div class="empty-state" style="padding:20px;">暂无消息</div>';
                }
            } catch (e) { showToast("加载失败","error"); }
        }

        // ==================== 消息历史 Tab ====================
        function populateHistoryGuildSelect() {
            const sel = document.getElementById("history-guild-select");
            const cv = sel.value;
            sel.innerHTML = '<option value="">-- 选择服务器 --</option>';
            if (!guildsData.length) { apiFetch(API+"/api/guilds").then(r=>r.json()).then(d=>{if(d.success){guildsData=d.data;populateHistoryGuildSelect();}}); return; }
            guildsData.forEach(g => { const o=document.createElement("option"); o.value=g.guild_id; o.textContent=`${g.guild_name||'未知'} (${g.guild_id})`; sel.appendChild(o); });
            if (cv) sel.value = cv;
        }

        async function onHistoryGuildChange() {
            const gid = document.getElementById("history-guild-select").value;
            const cs = document.getElementById("history-channel-select");
            document.getElementById("history-guild-hint").textContent = gid || "选择服务器和频道";
            if (!gid) { cs.innerHTML='<option value="">-- 先选服务器 --</option>'; return; }
            cs.innerHTML = '<option value="">加载中...</option>';
            try {
                const resp = await apiFetch(API + "/api/guilds/" + gid + "/channels");
                const data = await resp.json();
                if (data.success) {
                    cs.innerHTML = '<option value="">-- 选择频道 --</option>';
                    data.data.forEach(ch => { const o=document.createElement("option"); o.value=ch.id; o.textContent=(ch.category?`[${ch.category}] `:"")+"#"+ch.name; cs.appendChild(o); });
                } else cs.innerHTML = '<option value="">获取失败</option>';
            } catch (e) { cs.innerHTML = '<option value="">获取失败</option>'; }
        }

        async function loadHistoryMessages() {
            const cid = document.getElementById("history-channel-select").value;
            const limit = document.getElementById("history-limit").value || 20;
            if (!cid) { showToast("请选择频道","error"); return; }
            const container = document.getElementById("history-messages");
            container.innerHTML = '<div class="spinner"></div>';
            try {
                const resp = await apiFetch(API + `/api/channels/${cid}/messages?limit=${Math.min(limit,100)}`);
                const data = await resp.json();
                if (data.success && data.data.length) {
                    container.innerHTML = data.data.reverse().map(m => `
                        <div class="msg-history-item">
                            <img class="msg-history-avatar" src="${m.avatar_url || ''}" onerror="this.style.display='none'" alt="">
                            <div class="msg-history-content">
                                <div class="msg-history-author" style="color:${m.color || 'var(--text)'};">${esc(m.author)} <span style="color:var(--text-muted);font-weight:400;font-size:10px;">${m.timestamp}</span></div>
                                <div class="msg-history-text">${formatContent(m.content)}</div>
                                ${m.attachments ? m.attachments.map(a => `<a href="${a.url}" target="_blank" style="color:var(--cyan);font-size:11px;">📎 ${esc(a.filename)}</a>`).join("<br>") : ""}
                            </div>
                        </div>`).join("");
                } else container.innerHTML = '<div class="empty-state">暂无消息</div>';
            } catch (e) { container.innerHTML = '<div class="empty-state">⚠️ 加载失败</div>'; }
        }

        function formatContent(content) {
            return esc(content)
                .replace(/&lt;@(\d+)&gt;/g, '<span style="color:var(--cyan);">@用户</span>')
                .replace(/&lt;#(\d+)&gt;/g, '<span style="color:var(--cyan);">#频道</span>');
        }

        // ==================== 设置 ====================
        async function loadSettings() {
            if (!currentGuildId) return;
            document.getElementById("settings-guild-hint").textContent = currentGuildId;
            const guild = guildsData.find(g => g.guild_id === currentGuildId);
            const gn = guild?.guild_name || currentGuildId;
            try {
                const resp = await apiFetch(API + "/api/settings/" + currentGuildId);
                const data = await resp.json();
                if (data.success) {
                    document.getElementById("settings-panel").innerHTML = `
                        <div style="margin-bottom:14px;font-size:12px;color:var(--text-secondary);">编辑: <strong style="color:var(--text);">${esc(gn)}</strong></div>
                        <div class="settings-row"><div><div class="settings-label">经验倍率</div><div class="settings-desc">消息 XP 倍率 (0.1-10.0)</div></div>
                            <div style="display:flex;align-items:center;gap:6px;"><input type="number" class="settings-input" id="setting-xp-rate" value="${data.data.xp_rate||1.0}" min="0.1" max="10.0" step="0.1"><span style="font-size:11px;color:var(--text-muted);">×</span></div></div>
                        <div class="settings-row"><div><div class="settings-label">语音经验倍率</div><div class="settings-desc">语音 XP 倍率 (0.1-10.0)</div></div>
                            <div style="display:flex;align-items:center;gap:6px;"><input type="number" class="settings-input" id="setting-voice-xp-rate" value="${data.data.voice_xp_rate||1.0}" min="0.1" max="10.0" step="0.1"><span style="font-size:11px;color:var(--text-muted);">×</span></div></div>
                        <button class="btn" onclick="saveSettings()" style="margin-top:14px;width:100%;">💾 保存</button>`;
                }
            } catch (e) {}
        }

        async function saveSettings() {
            if (!currentGuildId) return;
            const xr = document.getElementById("setting-xp-rate")?.value;
            const vr = document.getElementById("setting-voice-xp-rate")?.value;
            try {
                const resp = await apiFetch(API + "/api/settings/" + currentGuildId, {
                    method: "POST",
                    body: JSON.stringify({ xp_rate: parseFloat(xr), voice_xp_rate: parseFloat(vr) })
                });
                const data = await resp.json();
                showToast(data.success ? "✅ 已保存" : "❌ " + data.error, data.success ? "success" : "error");
            } catch (e) { showToast("保存失败","error"); }
        }

        // ==================== 工具 ====================
        function animateValue(id, target) {
            const el = document.getElementById(id);
            const cur = parseInt(el.textContent.replace(/,/g,'')) || 0;
            if (cur === target) { el.textContent = target.toLocaleString(); return; }
            const d=600, s=performance.now();
            function u(n) {
                const p=Math.min((n-s)/d, 1);
                el.textContent = Math.round(cur+(target-cur)*(1-Math.pow(1-p,3))).toLocaleString();
                if (p<1) requestAnimationFrame(u);
            }
            requestAnimationFrame(u);
        }

        function esc(s) { if (!s) return ""; const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

        function showToast(msg, type) {
            const c = document.getElementById("toast-container");
            const t = document.createElement("div");
            t.className = "toast " + type; t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity="0"; t.style.transition="opacity 0.3s"; setTimeout(()=>t.remove(),300); }, 3000);
        }

        initAuth();
    </script>
</body>
</html>
