<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Bot 控制面板</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --cyan: #41b7b7;
            --pink: #c94d8c;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --gold: #d2991d;
            --silver: #8b949e;
            --bronze: #cd7f32;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: var(--cyan);
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 25px;
            font-size: 14px;
        }

        .config-bar {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .config-bar label {
            color: var(--text-dim);
            font-size: 13px;
            white-space: nowrap;
        }

        .config-bar input {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
            min-width: 250px;
        }

        .config-bar button {
            background: var(--cyan);
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
        }

        .config-bar button:hover {
            opacity: 0.9;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
        }

        .card h3 {
            color: var(--text-dim);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .card .value {
            font-size: 32px;
            font-weight: bold;
            color: var(--cyan);
        }

        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section h2 {
            color: var(--cyan);
            margin-bottom: 15px;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rank-1 td:first-child {
            color: var(--gold);
        }

        .rank-2 td:first-child {
            color: var(--silver);
        }

        .rank-3 td:first-child {
            color: var(--bronze);
        }

        .level-badge {
            display: inline-block;
            background: var(--cyan);
            color: var(--bg);
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
        }

        code {
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        button.link-btn {
            background: none;
            color: var(--cyan);
            border: none;
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
            padding: 0;
        }

        button.link-btn:hover {
            opacity: 0.8;
        }

        .loading {
            color: var(--text-dim);
            font-style: italic;
            padding: 15px 0;
        }

        @media (max-width: 600px) {
            .stats-row {
                grid-template-columns: 1fr 1fr;
            }

            .config-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <h1>🔮 Arcane Bot</h1>
    <p class="subtitle">Discord Bot 控制面板 · <span id="connection-status">未配置 API</span></p>

    <!-- API 配置栏 -->
    <div class="config-bar">
        <label>🔗 API 地址:</label>
        <input type="text" id="api-url" placeholder="https://xxx.trycloudflare.com">
        <button onclick="connectAPI()">连接</button>
        <span id="config-status" style="font-size: 13px;"></span>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-row">
        <div class="card">
            <h3>📊 总用户</h3>
            <div class="value" id="total-users">-</div>
        </div>
        <div class="card">
            <h3>🌐 服务器数</h3>
            <div class="value" id="total-guilds">-</div>
        </div>
        <div class="card">
            <h3>🏆 最高等级</h3>
            <div class="value" id="max-level">-</div>
        </div>
    </div>

    <!-- 服务器列表 -->
    <div class="section">
        <h2>📋 服务器列表</h2>
        <table id="guilds-table">
            <thead>
                <tr>
                    <th>服务器 ID</th>
                    <th>用户数</th>
                    <th>最高等级</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p id="guilds-loading" class="loading">等待连接...</p>
    </div>

    <!-- 排行榜 -->
    <div class="section">
        <h2>🏆 排行榜</h2>
        <p style="color: var(--text-dim); margin-bottom: 10px;">点击服务器列表中的"查看"按钮，或手动输入服务器 ID</p>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="guild-id" placeholder="输入服务器 ID" style="flex: 1; max-width: 300px;">
            <button onclick="loadLeaderboard()">查询</button>
        </div>
        <table id="leaderboard-table" style="display: none;">
            <thead>
                <tr>
                    <th>#</th>
                    <th>用户 ID</th>
                    <th>等级</th>
                    <th>XP</th>
                    <th>语音 XP</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p id="lb-loading" class="loading" style="display: none;">加载中...</p>
    </div>

    <script>
        let API_BASE = "";

        // 尝试从 localStorage 恢复上次的 API 地址
        const savedAPI = localStorage.getItem("arcane_bot_api");
        if (savedAPI) {
            document.getElementById("api-url").value = savedAPI;
            API_BASE = savedAPI;
            connectAPI(true);
        }

        function connectAPI(silent = false) {
            const url = document.getElementById("api-url").value.trim();
            if (!url) {
                if (!silent) alert("请输入 API 地址");
                return;
            }

            // 去掉末尾斜杠
            API_BASE = url.replace(/\/$/, "");
            localStorage.setItem("arcane_bot_api", API_BASE);

            const statusEl = document.getElementById("config-status");
            statusEl.textContent = "连接中...";
            statusEl.style.color = "var(--text-dim)";

            fetch(API_BASE + "/api/health")
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById("connection-status").textContent = "✅ 已连接";
                        document.getElementById("connection-status").style.color = "#3fb950";
                        statusEl.textContent = "✅";
                        statusEl.style.color = "#3fb950";
                        loadAll();
                    } else {
                        throw new Error("API 返回失败");
                    }
                })
                .catch(() => {
                    document.getElementById("connection-status").textContent = "❌ 连接失败";
                    document.getElementById("connection-status").style.color = "#f85149";
                    statusEl.textContent = "❌";
                    statusEl.style.color = "#f85149";
                });
        }

        function loadAll() {
            loadStats();
            loadGuilds();
        }

        function loadStats() {
            fetch(API_BASE + "/api/stats")
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById("total-users").textContent = data.data.total_users;
                        document.getElementById("total-guilds").textContent = data.data.total_guilds;
                        document.getElementById("max-level").textContent = data.data.max_level;
                    }
                });
        }

        function loadGuilds() {
            document.getElementById("guilds-loading").style.display = "block";
            fetch(API_BASE + "/api/guilds")
                .then(res => res.json())
                .then(data => {
                    document.getElementById("guilds-loading").style.display = "none";
                    if (data.success) {
                        const tbody = document.querySelector("#guilds-table tbody");
                        tbody.innerHTML = "";
                        data.data.forEach(g => {
                            const tr = document.createElement("tr");
                            tr.innerHTML = `
                                <td><code>${g.guild_id}</code></td>
                                <td>${g.user_count}</td>
                                <td><span class="level-badge">Lv.${g.max_level}</span></td>
                                <td><button class="link-btn" onclick="viewGuild('${g.guild_id}')">查看排行 →</button></td>
                            `;
                            tbody.appendChild(tr);
                        });
                    }
                })
                .catch(() => {
                    document.getElementById("guilds-loading").style.display = "none";
                });
        }

        function viewGuild(guildId) {
            document.getElementById("guild-id").value = guildId;
            loadLeaderboard();
        }

        function loadLeaderboard() {
            const guildId = document.getElementById("guild-id").value.trim();
            if (!guildId) {
                alert("请输入服务器 ID");
                return;
            }

            const table = document.getElementById("leaderboard-table");
            const loading = document.getElementById("lb-loading");
            table.style.display = "none";
            loading.style.display = "block";

            fetch(API_BASE + "/api/leaderboard/" + guildId)
                .then(res => res.json())
                .then(data => {
                    loading.style.display = "none";
                    table.style.display = "table";
                    const tbody = table.querySelector("tbody");
                    tbody.innerHTML = "";

                    if (data.success && data.data.length > 0) {
                        data.data.forEach(row => {
                            const tr = document.createElement("tr");
                            if (row.rank <= 3) tr.classList.add("rank-" + row.rank);
                            tr.innerHTML = `
                                <td>${row.rank <= 3 ? ["🥇","🥈","🥉"][row.rank-1] : row.rank}</td>
                                <td><code>${row.user_id}</code></td>
                                <td><span class="level-badge">Lv.${row.level}</span></td>
                                <td>${row.xp.toLocaleString()}</td>
                                <td>${row.voice_xp.toLocaleString()}</td>
                            `;
                            tbody.appendChild(tr);
                        });
                    } else {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);">暂无数据</td></tr>';
                    }
                })
                .catch(() => {
                    loading.style.display = "none";
                    table.style.display = "table";
                    const tbody = table.querySelector("tbody");
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#f85149;">加载失败</td></tr>';
                });
        }
    </script>
</body>
</html>
